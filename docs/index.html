<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daymori Prompt Compiler</title>
    <style>
      :root {
        --bg: #000000;
        --panel: #0a0a0a;
        --line: #252525;
        --text: #f5f5f7;
        --muted: #a1a1aa;
        --brand: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background: radial-gradient(circle at 20% 0%, #1b1b1b 0%, #090909 42%, #000000 100%);
        font-family: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        display: grid;
        place-items: center;
        padding: 14px;
      }

      .app {
        width: min(980px, 100%);
        height: min(90vh, 860px);
        border: 1px solid var(--line);
        border-radius: 28px;
        overflow: hidden;
        display: grid;
        grid-template-rows: auto auto auto 1fr auto;
        background: linear-gradient(180deg, #111111 0%, #050505 100%);
        box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      .header {
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        font-size: 13px;
        letter-spacing: 0.3px;
        color: var(--muted);
      }

      .config {
        display: block;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
      }

      .intro {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
      }

      .intro-card {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: #0a0a0a;
        padding: 10px 12px;
      }

      .intro-label {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 4px;
      }

      .intro-value {
        font-size: 14px;
        color: var(--text);
        line-height: 1.5;
      }

      .field,
      textarea,
      button {
        border-radius: 14px;
        border: 1px solid var(--line);
        background: #0b0b0b;
        color: var(--text);
        font: inherit;
        outline: none;
      }

      .field {
        width: 100%;
        padding: 10px 12px;
      }

      .field:focus,
      textarea:focus {
        border-color: var(--brand);
      }

      .messages {
        overflow: auto;
        padding: 14px;
        display: grid;
        gap: 12px;
      }

      .msg {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--panel);
        padding: 12px 14px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .msg.user {
        border-color: #444;
        background: #151515;
      }

      .msg-actions {
        margin-top: 10px;
        display: flex;
        gap: 8px;
      }

      .deliverable {
        border: 1px solid #2f2f33;
        border-radius: 14px;
        background: #0d0d0f;
        padding: 12px;
      }

      .deliverable-title {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 8px;
      }

      .block {
        border: 1px solid #2a2a2e;
        border-radius: 12px;
        padding: 10px;
        margin-top: 8px;
        background: #0a0a0c;
      }

      .block-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 6px;
      }

      .block-label {
        font-size: 12px;
        color: var(--muted);
      }

      .block-content {
        white-space: pre-wrap;
        line-height: 1.5;
      }

      .mini-btn {
        border: 1px solid #3a3a3a;
        background: #0f0f10;
        color: #f5f5f7;
        border-radius: 10px;
        font-size: 12px;
        padding: 6px 10px;
        cursor: pointer;
      }

      .mini-btn:hover {
        border-color: #8b8b8b;
      }

      .composer {
        border-top: 1px solid var(--line);
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        padding: 10px;
      }

      textarea {
        width: 100%;
        min-height: 96px;
        max-height: 220px;
        resize: vertical;
        padding: 12px 14px;
      }

      button {
        cursor: pointer;
        background: #f5f5f7;
        border: 1px solid #ffffff;
        color: #050505;
        font-weight: 700;
        padding: 0 20px;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .helper {
        margin-top: 7px;
        font-size: 12px;
        color: var(--muted);
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }

      .file-line {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .dropzone {
        border: 1px dashed #4a4a4a;
        border-radius: 14px;
        padding: 10px 12px;
        color: var(--muted);
        font-size: 13px;
        background: #0c0c0c;
        cursor: pointer;
        margin-bottom: 8px;
      }

      .dropzone.active {
        border-color: #ffffff;
        color: var(--text);
        background: #111;
      }

      .file-name {
        color: var(--muted);
      }

      .draft-actions {
        margin-top: 8px;
        display: flex;
        gap: 8px;
      }

      @media (max-width: 900px) {
        .intro {
          grid-template-columns: 1fr;
        }

        .app {
          height: 95vh;
          border-radius: 20px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <div class="header">Daymori Teacher Prompt Studio · 课堂PPT提示词专用</div>
      <section class="config">
        <div class="field">服务人群: 教师 | 场景: 课堂PPT | 默认模型: DeepSeek（无需用户输入 Key）</div>
      </section>
      <section class="intro">
        <article class="intro-card">
          <div class="intro-label">你要输入什么</div>
          <div class="intro-value">输入学段、学科、课题目标；可拖入教材片段、课程标准或教学大纲文件。</div>
        </article>
        <article class="intro-card">
          <div class="intro-label">你会得到什么</div>
          <div class="intro-value">可直接给 AI 使用的课堂PPT终版提示词，可一键复制并立即出稿。</div>
        </article>
      </section>
      <section id="messages" class="messages">
        <article class="msg">示例输入：请为高一物理《牛顿第二定律》生成 12 页课堂 PPT 提示词，含导入、推导、例题、互动练习与课后作业。</article>
      </section>
      <form id="composer" class="composer">
        <div>
          <div id="dropzone" class="dropzone">拖拽文件到这里，或点击选择文件（1个）</div>
          <textarea id="input" placeholder="输入教学需求（如：年级、学科、课题、课时、资料类型）"></textarea>
          <div class="helper">
            <span>Shift+Enter 换行，Enter 发送</span>
            <div class="file-line">
              <input id="file" type="file" accept=".txt,.md,.json,.js,.ts,.html,.css,.csv" hidden />
              <span id="fileName" class="file-name">未选择文件</span>
            </div>
          </div>
          <div class="draft-actions">
            <button id="copyLatestBtn" class="mini-btn" type="button">复制最新提示词</button>
            <button id="openAiBtn" class="mini-btn" type="button">立即出稿（打开 DeepSeek）</button>
          </div>
        </div>
        <button id="send" type="submit">发送</button>
      </form>
    </main>

    <script>
      const fileEl = document.getElementById("file");
      const dropzoneEl = document.getElementById("dropzone");
      const copyLatestBtnEl = document.getElementById("copyLatestBtn");
      const openAiBtnEl = document.getElementById("openAiBtn");
      const fileNameEl = document.getElementById("fileName");
      const messagesEl = document.getElementById("messages");
      const formEl = document.getElementById("composer");
      const inputEl = document.getElementById("input");
      const sendEl = document.getElementById("send");

      let contextText = "";
      let latestAssistantText = "";
      let latestStructured = null;
      let latestRawInput = "";

      const DEFAULT_DEEPSEEK_MODEL = "deepseek-chat";
      const OFFICIAL_DEEPSEEK_ENDPOINT = "https://api.deepseek.com/v1/chat/completions";
      const DEFAULT_DEEPSEEK_KEY = [
        "sk-5ba1c769ac7d4708",
        "88963788d1a7eaab"
      ].join("");

      const BLOCK_DEFS = [
        { key: "goals", label: "教学目标" },
        { key: "pagePlan", label: "页数规划" },
        { key: "pageDetails", label: "每页内容" },
        { key: "interaction", label: "互动题" },
        { key: "homework", label: "作业" },
        { key: "finalPrompt", label: "终版提示词" }
      ];

      async function copyText(text) {
        if (!text || !text.trim()) {
          pushMessage("当前还没有可复制的提示词。", "assistant");
          return;
        }
        await navigator.clipboard.writeText(text);
        pushMessage("已复制提示词。打开 DeepSeek 后直接粘贴即可出稿。", "assistant");
      }

      function safeJsonParse(text) {
        try {
          return JSON.parse(text);
        } catch {
          return null;
        }
      }

      function firstJsonObject(text) {
        if (!text) return null;
        const fenced = text.match(/```(?:json)?\s*([\s\S]*?)\s*```/i);
        const source = fenced ? fenced[1] : text;
        const start = source.indexOf("{");
        const end = source.lastIndexOf("}");
        if (start === -1 || end === -1 || end <= start) return null;
        return source.slice(start, end + 1);
      }

      function extractFieldByRegex(text, label) {
        const r = new RegExp(label + "[：:]\\s*([\\s\\S]*?)(?=\\n(?:教学目标|页数规划|每页内容|互动题|作业|终版提示词)[：:]|$)", "i");
        const m = text.match(r);
        return m ? m[1].trim() : "";
      }

      function toReadable(value) {
        if (value == null) return "";
        if (typeof value === "string") return value.trim();
        if (Array.isArray(value)) {
          return value
            .map((item) => {
              if (typeof item === "string") return item;
              if (item && typeof item === "object") return JSON.stringify(item, null, 2);
              return String(item);
            })
            .join("\n")
            .trim();
        }
        if (typeof value === "object") {
          return JSON.stringify(value, null, 2).trim();
        }
        return String(value).trim();
      }

      function parseStructuredResponse(rawText) {
        const candidate = firstJsonObject(rawText);
        if (candidate) {
          const parsed = safeJsonParse(candidate);
          if (parsed && typeof parsed === "object") {
            return {
              goals: toReadable(parsed.goals),
              pagePlan: toReadable(parsed.pagePlan),
              pageDetails: toReadable(parsed.pageDetails),
              interaction: toReadable(parsed.interaction),
              homework: toReadable(parsed.homework),
              finalPrompt: toReadable(parsed.finalPrompt)
            };
          }
        }

        return {
          goals: extractFieldByRegex(rawText, "教学目标"),
          pagePlan: extractFieldByRegex(rawText, "页数规划"),
          pageDetails: extractFieldByRegex(rawText, "每页内容"),
          interaction: extractFieldByRegex(rawText, "互动题"),
          homework: extractFieldByRegex(rawText, "作业"),
          finalPrompt: extractFieldByRegex(rawText, "终版提示词") || rawText.trim()
        };
      }

      function isStructuredComplete(structured) {
        if (!structured) return false;
        const keys = ["goals", "pagePlan", "pageDetails", "interaction", "homework", "finalPrompt"];
        const filled = keys.filter((k) => structured[k] && String(structured[k]).trim()).length;
        return filled >= 4;
      }

      async function normalizeStructuredOutput(rawText) {
        const repairPrompt = [
          "请把下面内容整理为严格 JSON。",
          "只输出 JSON，不要解释。",
          "字段必须包含：goals,pagePlan,pageDetails,interaction,homework,finalPrompt。",
          "六个字段必须都是字符串，不允许数组/对象。",
          "每个字段尽量精炼：goals<=120字，pagePlan<=120字，pageDetails<=280字，interaction<=120字，homework<=120字，finalPrompt<=420字。",
          "原始内容：",
          rawText
        ].join("\n\n");

        const repaired = await requestDeepSeekDirect(repairPrompt, {
          system: "你是结构化清洗器，只输出有效JSON。"
        });
        return parseStructuredResponse(repaired);
      }

      function splitByHeadings(text) {
        const lines = String(text || "").replace(/\r\n/g, "\n").split("\n");
        const chunks = [];
        let buf = [];
        for (const line of lines) {
          const t = line.trim();
          if (/^#{1,6}\s+/.test(t) || /^[一二三四五六七八九十0-9]+[、.)）]\s*/.test(t)) {
            if (buf.length) chunks.push(buf.join("\n").trim());
            buf = [line];
          } else {
            buf.push(line);
          }
        }
        if (buf.length) chunks.push(buf.join("\n").trim());
        return chunks.filter(Boolean);
      }

      function extractKeywords(text) {
        const words = String(text || "")
          .toLowerCase()
          .replace(/[^\u4e00-\u9fa5a-z0-9_\-\s]/g, " ")
          .split(/\s+/)
          .filter((w) => w && w.length >= 2);
        const stop = new Set(["课堂", "教学", "学生", "老师", "以及", "进行", "可以", "一个", "the", "and", "for", "with"]);
        const count = new Map();
        for (const w of words) {
          if (stop.has(w)) continue;
          count.set(w, (count.get(w) || 0) + 1);
        }
        return Array.from(count.entries())
          .sort((a, b) => b[1] - a[1])
          .slice(0, 12)
          .map(([w]) => w);
      }

      function extractTeachingFields(input, context) {
        const all = [input, context].join("\n");
        const grade = (all.match(/(小学[一二三四五六]|初中[一二三]|高中[一二三]|[一二三四五六七八九]年级|高一|高二|高三|初一|初二|初三)/) || [""])[0];
        const subject = (all.match(/(语文|数学|英语|物理|化学|生物|历史|地理|政治|道德与法治|科学|信息技术|音乐|美术|体育)/) || [""])[0];
        let topic = "";
        const quote = all.match(/[《【](.+?)[》】]/);
        if (quote) topic = quote[1];
        if (!topic) {
          const m = all.match(/(?:课题|主题|内容)[：:]\s*([^\n，。]+)/);
          topic = m ? m[1].trim() : "";
        }

        const keyMatches = all.match(/(?:知识点|关键词|核心概念)[：:]\s*([^\n]+)/);
        const keywords = keyMatches ? keyMatches[1].split(/[，,、]/).map((s) => s.trim()).filter(Boolean) : extractKeywords(context || input);

        const hardMatches = all.match(/(?:重难点|重点难点|难点)[：:]\s*([^\n]+)/);
        const hardPoints = hardMatches ? hardMatches[1].split(/[；;，,、]/).map((s) => s.trim()).filter(Boolean) : [];

        return { grade, subject, topic, keywords, hardPoints };
      }

      function buildSemanticPack(rawInput, context) {
        const chunks = splitByHeadings(context || "");
        const snippets = (chunks.length ? chunks : (context || "").split(/\n{2,}/)).map((s) => s.trim()).filter(Boolean).slice(0, 8);
        const fields = extractTeachingFields(rawInput, context);
        return {
          fields,
          snippets,
          stageFlow: ["导入", "讲解", "互动", "练习", "小结"]
        };
      }

      function renderDeliverable(structured) {
        const wrap = document.createElement("article");
        wrap.className = "msg";

        const box = document.createElement("section");
        box.className = "deliverable";

        const title = document.createElement("div");
        title.className = "deliverable-title";
        title.textContent = "可交付产物（课堂PPT提示词）";
        box.appendChild(title);

        for (const def of BLOCK_DEFS) {
          const block = document.createElement("section");
          block.className = "block";

          const head = document.createElement("div");
          head.className = "block-head";

          const label = document.createElement("div");
          label.className = "block-label";
          label.textContent = def.label;

          const btn = document.createElement("button");
          btn.className = "mini-btn";
          btn.type = "button";
          btn.textContent = "重写此块";
          btn.addEventListener("click", async () => {
            try {
              await regenerateBlock(def.key);
            } catch (error) {
              pushMessage("重写失败: " + error.message, "assistant");
            }
          });

          head.appendChild(label);
          head.appendChild(btn);

          const content = document.createElement("div");
          content.className = "block-content";
          content.textContent = structured[def.key] || "(空)";

          block.appendChild(head);
          block.appendChild(content);
          box.appendChild(block);
        }

        wrap.appendChild(box);
        messagesEl.appendChild(wrap);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      async function regenerateBlock(blockKey) {
        if (!latestStructured || !latestRawInput) {
          throw new Error("请先生成一次结果");
        }

        const keep = BLOCK_DEFS.filter((b) => b.key !== blockKey).map((b) => `${b.label}:\n${latestStructured[b.key] || ""}`).join("\n\n");

        const blockLabel = (BLOCK_DEFS.find((b) => b.key === blockKey) || { label: blockKey }).label;
        const prompt = [
          "你只需要重写一个结构块，返回纯文本，不要解释。",
          `目标块: ${blockLabel}`,
          "其余块保持不变（供参考）：",
          keep,
          "用户原始需求：",
          latestRawInput,
          "请直接输出目标块内容。"
        ].join("\n\n");

        const rewritten = await requestDeepSeekDirect(prompt, {
          system: "你是课堂PPT提示词改写器，只输出被要求的单块正文。"
        });

        latestStructured[blockKey] = rewritten.trim();
        latestAssistantText = latestStructured.finalPrompt || latestAssistantText;
        pushMessage(`${blockLabel} 已重写完成。`, "assistant");
        renderDeliverable(latestStructured);
      }

      function pushMessage(text, role) {
        const node = document.createElement("article");
        node.className = role === "user" ? "msg user" : "msg";

        const content = document.createElement("div");
        content.textContent = text;
        node.appendChild(content);

        if (role !== "user") {
          const actions = document.createElement("div");
          actions.className = "msg-actions";
          const copyBtn = document.createElement("button");
          copyBtn.className = "mini-btn";
          copyBtn.type = "button";
          copyBtn.textContent = "复制这一条";
          copyBtn.addEventListener("click", async () => {
            try {
              await copyText(text);
            } catch (error) {
              pushMessage("复制失败: " + error.message, "assistant");
            }
          });
          actions.appendChild(copyBtn);
          node.appendChild(actions);
        }

        messagesEl.appendChild(node);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      async function loadFileContext(file) {
        if (!file) {
          fileNameEl.textContent = "未选择文件";
          contextText = "";
          return;
        }

        fileNameEl.textContent = file.name;
        try {
          contextText = await file.text();
          if (contextText.length > 12000) {
            contextText = contextText.slice(0, 12000) + "\n...[已截断]";
          }
          pushMessage("文件上下文已加载。", "assistant");
        } catch (error) {
          contextText = "";
          pushMessage("读取文件失败: " + error.message, "assistant");
        }
      }

      fileEl.addEventListener("change", async () => {
        const file = fileEl.files && fileEl.files[0];
        await loadFileContext(file);
      });

      async function requestDeepSeekDirect(userText, opts = {}) {
        const systemText = opts.system || [
          "你是课堂PPT提示词专家。",
          "任务：把教师需求编译成可直接粘贴给AI生成PPT的可交付结构化结果。",
          "请严格输出 JSON，字段必须包含：goals,pagePlan,pageDetails,interaction,homework,finalPrompt。",
          "六个字段必须全部为字符串，禁止数组和对象。",
          "长度控制：goals<=120字，pagePlan<=120字，pageDetails<=280字，interaction<=120字，homework<=120字，finalPrompt<=420字。",
          "finalPrompt 必须是最终可直接复制给AI出稿的完整提示词。"
        ].join(" ");

        const resp = await fetch(OFFICIAL_DEEPSEEK_ENDPOINT, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + DEFAULT_DEEPSEEK_KEY
          },
          body: JSON.stringify({
            model: DEFAULT_DEEPSEEK_MODEL,
            messages: [
              { role: "system", content: systemText },
              { role: "user", content: userText }
            ],
            temperature: 0.2,
            max_tokens: 850
          })
        });

        const raw = await resp.text();
        let data = {};
        try {
          data = raw ? JSON.parse(raw) : {};
        } catch (error) {
          throw new Error("DeepSeek 返回非 JSON: " + raw.slice(0, 200));
        }

        if (!resp.ok) {
          const detail = data.detail || data.error || (data.error && data.error.message) || raw.slice(0, 220);
          throw new Error("DeepSeek 请求失败(" + resp.status + "): " + detail);
        }

        const text = data && data.choices && data.choices[0] && data.choices[0].message ? data.choices[0].message.content : "";
        if (typeof text === "string" && text.trim()) return text;
        return "(无输出)";
      }

      dropzoneEl.addEventListener("click", () => fileEl.click());

      ["dragenter", "dragover"].forEach((evt) => {
        dropzoneEl.addEventListener(evt, (event) => {
          event.preventDefault();
          dropzoneEl.classList.add("active");
        });
      });

      ["dragleave", "drop"].forEach((evt) => {
        dropzoneEl.addEventListener(evt, (event) => {
          event.preventDefault();
          dropzoneEl.classList.remove("active");
        });
      });

      dropzoneEl.addEventListener("drop", async (event) => {
        const files = event.dataTransfer && event.dataTransfer.files ? event.dataTransfer.files : [];
        const file = files[0];
        await loadFileContext(file);
      });

      window.addEventListener("dragover", (event) => event.preventDefault());
      window.addEventListener("drop", (event) => event.preventDefault());

      copyLatestBtnEl.addEventListener("click", async () => {
        try {
          await copyText(latestAssistantText);
        } catch (error) {
          pushMessage("复制失败: " + error.message, "assistant");
        }
      });

      openAiBtnEl.addEventListener("click", async () => {
        try {
          await copyText(latestAssistantText);
        } catch (error) {
          pushMessage("复制失败: " + error.message, "assistant");
          return;
        }
        window.open("https://chat.deepseek.com/", "_blank", "noopener,noreferrer");
      });

      inputEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          formEl.requestSubmit();
        }
      });

      formEl.addEventListener("submit", async (event) => {
        event.preventDefault();
        const text = inputEl.value.trim();
        if (!text) return;

        latestRawInput = contextText
          ? ["[用户需求]", text, "", "[文件上下文]", contextText].join("\n")
          : text;

        const semanticPack = buildSemanticPack(text, contextText);
        const payload = [
          "[用户需求]",
          text,
          "",
          "[语义调度层-关键字段提取]",
          JSON.stringify(semanticPack.fields, null, 2),
          "",
          "[语义调度层-文档分段摘要]",
          semanticPack.snippets.join("\n\n") || "(无)",
          "",
          "[课堂PPT结构重排]",
          semanticPack.stageFlow.join(" -> "),
          "",
          "[输出要求]",
          "请只输出 JSON，字段: goals,pagePlan,pageDetails,interaction,homework,finalPrompt。六个字段全部是字符串，不允许数组/对象。"
        ].join("\n");

        pushMessage(text, "user");
        inputEl.value = "";
        sendEl.disabled = true;

        try {
          const answer = await requestDeepSeekDirect(payload);
          let structured = parseStructuredResponse(answer);
          if (!isStructuredComplete(structured)) {
            structured = await normalizeStructuredOutput(answer);
          }
          latestStructured = structured;
          latestAssistantText = structured.finalPrompt || answer;

          renderDeliverable(structured);
          pushMessage("已生成可交付结构化产物。可复制终版提示词直接出稿，或重写任一单块。", "assistant");
        } catch (error) {
          pushMessage("错误: " + error.message, "assistant");
        } finally {
          sendEl.disabled = false;
          inputEl.focus();
        }
      });

    </script>
  </body>
</html>
