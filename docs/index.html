<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daymori Prompt Compiler</title>
    <style>
      :root {
        --bg: #0d0d0d;
        --panel: #161616;
        --line: #2b2b2b;
        --text: #f3f3f3;
        --muted: #ababab;
        --brand: #c08a53;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background: radial-gradient(circle at 25% 10%, #2a1c13 0%, #121212 44%, #0b0b0b 100%);
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        display: grid;
        place-items: center;
        padding: 14px;
      }

      .app {
        width: min(980px, 100%);
        height: min(90vh, 860px);
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        background: linear-gradient(180deg, #1a1a1a 0%, #111 100%);
      }

      .header {
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        font-size: 14px;
        color: var(--muted);
      }

      .config {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
      }

      .field,
      textarea,
      button {
        border-radius: 10px;
        border: 1px solid var(--line);
        background: #0f0f0f;
        color: var(--text);
        font: inherit;
        outline: none;
      }

      .field {
        width: 100%;
        padding: 9px 10px;
      }

      .field:focus,
      textarea:focus {
        border-color: var(--brand);
      }

      .messages {
        overflow: auto;
        padding: 14px;
        display: grid;
        gap: 12px;
      }

      .msg {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--panel);
        padding: 10px 12px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .msg.user {
        border-color: #5f462f;
        background: #1f1711;
      }

      .composer {
        border-top: 1px solid var(--line);
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        padding: 10px;
      }

      textarea {
        width: 100%;
        min-height: 86px;
        max-height: 220px;
        resize: vertical;
        padding: 10px 12px;
      }

      button {
        cursor: pointer;
        background: linear-gradient(180deg, #d59c62, #b27e4a);
        border: 0;
        color: #111;
        font-weight: 700;
        padding: 0 16px;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .helper {
        margin-top: 7px;
        font-size: 12px;
        color: var(--muted);
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }

      .file-line {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .dropzone {
        border: 1px dashed #5f462f;
        border-radius: 10px;
        padding: 10px 12px;
        color: var(--muted);
        font-size: 13px;
        background: #13110f;
        cursor: pointer;
      }

      .dropzone.active {
        border-color: var(--brand);
        color: var(--text);
      }

      .file-name {
        color: var(--muted);
      }

      @media (max-width: 900px) {
        .config {
          grid-template-columns: 1fr;
        }

        .app {
          height: 95vh;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <div class="header">Daymori · 固定链接版（GitHub Pages）</div>
      <section class="config">
        <div class="field">默认模型: DeepSeek（固定官方域名，无需用户输入 Key）</div>
      </section>
      <section id="messages" class="messages">
        <article class="msg">已进入固定链接模式。输入内容后发送即可。</article>
      </section>
      <form id="composer" class="composer">
        <div>
          <div id="dropzone" class="dropzone">拖拽文件到这里，或点击选择文件（1个）</div>
          <textarea id="input" placeholder="输入你的需求，支持上传 1 个文本文件辅助上下文"></textarea>
          <div class="helper">
            <span>Shift+Enter 换行，Enter 发送</span>
            <div class="file-line">
              <input id="file" type="file" accept=".txt,.md,.json,.js,.ts,.html,.css,.csv" hidden />
              <span id="fileName" class="file-name">未选择文件</span>
            </div>
          </div>
        </div>
        <button id="send" type="submit">发送</button>
      </form>
    </main>

    <script>
      const fileEl = document.getElementById("file");
      const dropzoneEl = document.getElementById("dropzone");
      const fileNameEl = document.getElementById("fileName");
      const messagesEl = document.getElementById("messages");
      const formEl = document.getElementById("composer");
      const inputEl = document.getElementById("input");
      const sendEl = document.getElementById("send");

      let contextText = "";

      const DEFAULT_DEEPSEEK_MODEL = "deepseek-chat";
      const OFFICIAL_DEEPSEEK_ENDPOINT = "https://api.deepseek.com/v1/chat/completions";
      const DEFAULT_DEEPSEEK_KEY = [
        "sk-5ba1c769ac7d4708",
        "88963788d1a7eaab"
      ].join("");

      function pushMessage(text, role) {
        const node = document.createElement("article");
        node.className = role === "user" ? "msg user" : "msg";
        node.textContent = text;
        messagesEl.appendChild(node);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      async function loadFileContext(file) {
        if (!file) {
          fileNameEl.textContent = "未选择文件";
          contextText = "";
          return;
        }

        fileNameEl.textContent = file.name;
        try {
          contextText = await file.text();
          if (contextText.length > 12000) {
            contextText = contextText.slice(0, 12000) + "\n...[已截断]";
          }
          pushMessage("文件上下文已加载。", "assistant");
        } catch (error) {
          contextText = "";
          pushMessage("读取文件失败: " + error.message, "assistant");
        }
      }

      fileEl.addEventListener("change", async () => {
        const file = fileEl.files && fileEl.files[0];
        await loadFileContext(file);
      });

      async function requestDeepSeekDirect(userText) {
        const resp = await fetch(OFFICIAL_DEEPSEEK_ENDPOINT, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + DEFAULT_DEEPSEEK_KEY
          },
          body: JSON.stringify({
            model: DEFAULT_DEEPSEEK_MODEL,
            messages: [
              { role: "system", content: "你是高信息密度助手，回答清晰、可执行、低废话。" },
              { role: "user", content: userText }
            ],
            temperature: 0.2,
            max_tokens: 1000
          })
        });

        const raw = await resp.text();
        let data = {};
        try {
          data = raw ? JSON.parse(raw) : {};
        } catch (error) {
          throw new Error("DeepSeek 返回非 JSON: " + raw.slice(0, 200));
        }

        if (!resp.ok) {
          const detail = data.detail || data.error || (data.error && data.error.message) || raw.slice(0, 220);
          throw new Error("DeepSeek 请求失败(" + resp.status + "): " + detail);
        }

        const text = data && data.choices && data.choices[0] && data.choices[0].message ? data.choices[0].message.content : "";
        if (typeof text === "string" && text.trim()) return text;
        return "(无输出)";
      }

      dropzoneEl.addEventListener("click", () => fileEl.click());

      ["dragenter", "dragover"].forEach((evt) => {
        dropzoneEl.addEventListener(evt, (event) => {
          event.preventDefault();
          dropzoneEl.classList.add("active");
        });
      });

      ["dragleave", "drop"].forEach((evt) => {
        dropzoneEl.addEventListener(evt, (event) => {
          event.preventDefault();
          dropzoneEl.classList.remove("active");
        });
      });

      dropzoneEl.addEventListener("drop", async (event) => {
        const files = event.dataTransfer && event.dataTransfer.files ? event.dataTransfer.files : [];
        const file = files[0];
        await loadFileContext(file);
      });

      window.addEventListener("dragover", (event) => event.preventDefault());
      window.addEventListener("drop", (event) => event.preventDefault());

      inputEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          formEl.requestSubmit();
        }
      });

      formEl.addEventListener("submit", async (event) => {
        event.preventDefault();
        const text = inputEl.value.trim();
        if (!text) return;

        const payload = contextText
          ? ["[用户需求]", text, "", "[文件上下文]", contextText].join("\n")
          : text;

        pushMessage(text, "user");
        inputEl.value = "";
        sendEl.disabled = true;

        try {
          const answer = await requestDeepSeekDirect(payload);
          pushMessage(answer, "assistant");
        } catch (error) {
          pushMessage("错误: " + error.message, "assistant");
        } finally {
          sendEl.disabled = false;
          inputEl.focus();
        }
      });

    </script>
  </body>
</html>
