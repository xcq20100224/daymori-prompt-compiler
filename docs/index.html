<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daymori Prompt Compiler</title>
    <style>
      :root {
        --bg: #000000;
        --panel: #0a0a0a;
        --line: #252525;
        --text: #f5f5f7;
        --muted: #a1a1aa;
        --brand: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background: radial-gradient(circle at 20% 0%, #1b1b1b 0%, #090909 42%, #000000 100%);
        font-family: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        display: grid;
        place-items: center;
        padding: 14px;
      }

      .app {
        width: min(980px, 100%);
        height: min(90vh, 860px);
        border: 1px solid var(--line);
        border-radius: 28px;
        overflow: hidden;
        display: grid;
        grid-template-rows: auto auto auto 1fr auto;
        background: linear-gradient(180deg, #111111 0%, #050505 100%);
        box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      .header {
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        font-size: 13px;
        letter-spacing: 0.3px;
        color: var(--muted);
      }

      .config {
        display: block;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
      }

      .intro {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
      }

      .intro-card {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: #0a0a0a;
        padding: 10px 12px;
      }

      .intro-label {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 4px;
      }

      .intro-value {
        font-size: 14px;
        color: var(--text);
        line-height: 1.5;
      }

      .field,
      textarea,
      button {
        border-radius: 14px;
        border: 1px solid var(--line);
        background: #0b0b0b;
        color: var(--text);
        font: inherit;
        outline: none;
      }

      .field {
        width: 100%;
        padding: 10px 12px;
      }

      .field:focus,
      textarea:focus {
        border-color: var(--brand);
      }

      .messages {
        overflow: auto;
        padding: 14px;
        display: grid;
        gap: 12px;
      }

      .msg {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--panel);
        padding: 12px 14px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .msg.user {
        border-color: #444;
        background: #151515;
      }

      .composer {
        border-top: 1px solid var(--line);
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        padding: 10px;
      }

      textarea {
        width: 100%;
        min-height: 96px;
        max-height: 220px;
        resize: vertical;
        padding: 12px 14px;
      }

      button {
        cursor: pointer;
        background: #f5f5f7;
        border: 1px solid #ffffff;
        color: #050505;
        font-weight: 700;
        padding: 0 20px;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .helper {
        margin-top: 7px;
        font-size: 12px;
        color: var(--muted);
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }

      .file-line {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .dropzone {
        border: 1px dashed #4a4a4a;
        border-radius: 14px;
        padding: 10px 12px;
        color: var(--muted);
        font-size: 13px;
        background: #0c0c0c;
        cursor: pointer;
        margin-bottom: 8px;
      }

      .dropzone.active {
        border-color: #ffffff;
        color: var(--text);
        background: #111;
      }

      .file-name {
        color: var(--muted);
      }

      @media (max-width: 900px) {
        .intro {
          grid-template-columns: 1fr;
        }

        .app {
          height: 95vh;
          border-radius: 20px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <div class="header">Daymori Teacher Prompt Studio · 教师教务资料提示词</div>
      <section class="config">
        <div class="field">服务人群: 教师 | 默认模型: DeepSeek（无需用户输入 Key）</div>
      </section>
      <section class="intro">
        <article class="intro-card">
          <div class="intro-label">你要输入什么</div>
          <div class="intro-value">输入学段、学科、课题目标；可拖入教材片段、课程标准或教学大纲文件。</div>
        </article>
        <article class="intro-card">
          <div class="intro-label">你会得到什么</div>
          <div class="intro-value">可直接给 AI 使用的高质量提示词，用于生成 PPT、教案、作业、试题与课堂活动材料。</div>
        </article>
      </section>
      <section id="messages" class="messages">
        <article class="msg">示例输入：请为高一物理《牛顿第二定律》生成 12 页课堂 PPT 提示词，含导入、推导、例题、互动练习与课后作业。</article>
      </section>
      <form id="composer" class="composer">
        <div>
          <div id="dropzone" class="dropzone">拖拽文件到这里，或点击选择文件（1个）</div>
          <textarea id="input" placeholder="输入教学需求（如：年级、学科、课题、课时、资料类型）"></textarea>
          <div class="helper">
            <span>Shift+Enter 换行，Enter 发送</span>
            <div class="file-line">
              <input id="file" type="file" accept=".txt,.md,.json,.js,.ts,.html,.css,.csv" hidden />
              <span id="fileName" class="file-name">未选择文件</span>
            </div>
          </div>
        </div>
        <button id="send" type="submit">发送</button>
      </form>
    </main>

    <script>
      const fileEl = document.getElementById("file");
      const dropzoneEl = document.getElementById("dropzone");
      const fileNameEl = document.getElementById("fileName");
      const messagesEl = document.getElementById("messages");
      const formEl = document.getElementById("composer");
      const inputEl = document.getElementById("input");
      const sendEl = document.getElementById("send");

      let contextText = "";

      const DEFAULT_DEEPSEEK_MODEL = "deepseek-chat";
      const OFFICIAL_DEEPSEEK_ENDPOINT = "https://api.deepseek.com/v1/chat/completions";
      const DEFAULT_DEEPSEEK_KEY = [
        "sk-5ba1c769ac7d4708",
        "88963788d1a7eaab"
      ].join("");

      function pushMessage(text, role) {
        const node = document.createElement("article");
        node.className = role === "user" ? "msg user" : "msg";
        node.textContent = text;
        messagesEl.appendChild(node);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      async function loadFileContext(file) {
        if (!file) {
          fileNameEl.textContent = "未选择文件";
          contextText = "";
          return;
        }

        fileNameEl.textContent = file.name;
        try {
          contextText = await file.text();
          if (contextText.length > 12000) {
            contextText = contextText.slice(0, 12000) + "\n...[已截断]";
          }
          pushMessage("文件上下文已加载。", "assistant");
        } catch (error) {
          contextText = "";
          pushMessage("读取文件失败: " + error.message, "assistant");
        }
      }

      fileEl.addEventListener("change", async () => {
        const file = fileEl.files && fileEl.files[0];
        await loadFileContext(file);
      });

      async function requestDeepSeekDirect(userText) {
        const resp = await fetch(OFFICIAL_DEEPSEEK_ENDPOINT, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + DEFAULT_DEEPSEEK_KEY
          },
          body: JSON.stringify({
            model: DEFAULT_DEEPSEEK_MODEL,
            messages: [
              {
                role: "system",
                content: "你是教师教务提示词专家。你的任务是把教师需求转成可直接用于 AI 生成教学资料的高质量提示词，输出应结构清晰、可执行、教学目标导向明确。"
              },
              { role: "user", content: userText }
            ],
            temperature: 0.2,
            max_tokens: 1000
          })
        });

        const raw = await resp.text();
        let data = {};
        try {
          data = raw ? JSON.parse(raw) : {};
        } catch (error) {
          throw new Error("DeepSeek 返回非 JSON: " + raw.slice(0, 200));
        }

        if (!resp.ok) {
          const detail = data.detail || data.error || (data.error && data.error.message) || raw.slice(0, 220);
          throw new Error("DeepSeek 请求失败(" + resp.status + "): " + detail);
        }

        const text = data && data.choices && data.choices[0] && data.choices[0].message ? data.choices[0].message.content : "";
        if (typeof text === "string" && text.trim()) return text;
        return "(无输出)";
      }

      dropzoneEl.addEventListener("click", () => fileEl.click());

      ["dragenter", "dragover"].forEach((evt) => {
        dropzoneEl.addEventListener(evt, (event) => {
          event.preventDefault();
          dropzoneEl.classList.add("active");
        });
      });

      ["dragleave", "drop"].forEach((evt) => {
        dropzoneEl.addEventListener(evt, (event) => {
          event.preventDefault();
          dropzoneEl.classList.remove("active");
        });
      });

      dropzoneEl.addEventListener("drop", async (event) => {
        const files = event.dataTransfer && event.dataTransfer.files ? event.dataTransfer.files : [];
        const file = files[0];
        await loadFileContext(file);
      });

      window.addEventListener("dragover", (event) => event.preventDefault());
      window.addEventListener("drop", (event) => event.preventDefault());

      inputEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          formEl.requestSubmit();
        }
      });

      formEl.addEventListener("submit", async (event) => {
        event.preventDefault();
        const text = inputEl.value.trim();
        if (!text) return;

        const payload = contextText
          ? ["[用户需求]", text, "", "[文件上下文]", contextText].join("\n")
          : text;

        pushMessage(text, "user");
        inputEl.value = "";
        sendEl.disabled = true;

        try {
          const answer = await requestDeepSeekDirect(payload);
          pushMessage(answer, "assistant");
        } catch (error) {
          pushMessage("错误: " + error.message, "assistant");
        } finally {
          sendEl.disabled = false;
          inputEl.focus();
        }
      });

    </script>
  </body>
</html>
