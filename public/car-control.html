          shapeKey: shapeKey || 'custom',
          points,
          loops,
          edgeSeconds,
          closeLoop,
        });
      };

      const applyDistanceHeuristic = (seq, text) => {
        const list = Array.isArray(seq) ? [...seq] : [];
        const raw = String(text || '');
        if (!list.length) return list;
        const m = raw.match(/([0-9]+(?:\.[0-9]+)?)\s*米/);
        if (!m) return list;
        const meters = Number(m[1]);
        if (!Number.isFinite(meters) || meters <= 0) return list;
        const sec = normalizeDurationSeconds(meters * METER_TO_SECONDS);
        if (!sec) return list;

        return list.map((step) => {
          if (!step || !step.cmd) return step;
          if (step.cmd === 'up' || step.cmd === 'down') {
            return step.seconds ? step : { ...step, seconds: sec };
          }
          return step;
        });
      };

      const parseCommandSequenceByLlm = async (text, mode = 'control') => {
        const userText = String(text || '').trim();
        if (!userText) return { commands: [], source: 'empty' };

        const systemPrompt = mode === 'vision'
          ? '你是小车命令语义拆解器。必须逐句剖析整段话，不允许漏句。输出严格JSON：{"intent":"...","clauses":[{"text":"原句分句","actions":[{"cmd":"up|down|left|right|stop|grab|release","distanceM":number|null,"durationSec":number|null,"count":number}]}],"path":{"shape":"任意图形名或null","points":[{"x":0-100,"y":0-100}],"closeLoop":true,"loops":number|null,"edgeSeconds":number|null},"actions":[{"cmd":"up|down|left|right|stop|grab|release","distanceM":number|null,"durationSec":number|null,"count":number}],"reason":"..."}。图形相关命令优先填path；可用shape，也可直接给points。未给长度时edgeSeconds写null。仅输出JSON。'
          : '你是小车控制命令语义拆解器。必须逐句剖析整段话，不允许漏句，不要关键词匹配。输出严格JSON：{"intent":"...","clauses":[{"text":"原句分句","actions":[{"cmd":"up|down|left|right|stop|grab|release","distanceM":number|null,"durationSec":number|null,"count":number}]}],"path":{"shape":"任意图形名或null","points":[{"x":0-100,"y":0-100}],"closeLoop":true,"loops":number|null,"edgeSeconds":number|null},"actions":[{"cmd":"up|down|left|right|stop|grab|release","distanceM":number|null,"durationSec":number|null,"count":number}],"reason":"..."}。图形命令优先给path；非图形命令给clauses/actions。例如“前进3米，再左拐继续前进2米”必须拆成至少三步。仅输出JSON。';

        try {
          const resp = await fetch(`${llmApiBase}/api/llm-proxy`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              system: systemPrompt,
              userText,
              maxTokens: 260,
            }),
          });
          const data = await resp.json().catch(() => ({}));
          if (!resp.ok) {
            throw new Error(data.detail || data.error || 'semantic_parse_failed');
          }

          const answer = String(data.text || '').trim();
          const json = extractFirstJsonObject(answer);
          if (!json) return { commands: [], source: 'llm-empty' };

          const shapePlan = buildShapePlanFromLlm(json, userText);
          if (shapePlan && shapePlan.commands.length) {
            const reason = String(json.reason || '').trim();
            return {
              commands: shapePlan.commands,
              source: 'llm',
              reason,
              preview: shapePlan.preview,
              previewDelayMs: shapePlan.previewDelayMs,
              previewShape: shapePlan.previewShape,
              previewSubtitle: shapePlan.previewSubtitle,
              previewPathD: shapePlan.previewPathD,
            };
          }

          let commands = collectActionsFromLlmJson(json);
          const expectedCount = estimateExpectedActionCount(userText);
          if (commands.length && commands.length < expectedCount) {
            const regexSeq = applyDistanceHeuristic(parseCommandSequenceFromText(userText), userText);
            if (regexSeq.length > commands.length) {
              commands = regexSeq;
            }
          }
          const reason = String(json.reason || '').trim();
          return { commands, source: 'llm', reason };
        } catch {
          return { commands: [], source: 'llm-error' };
        }
      };

      const parseCommandSequenceSmart = async (text, mode = 'control') => {
        const llmResult = await parseCommandSequenceByLlm(text, mode);
        if (llmResult.commands && llmResult.commands.length) {
          return llmResult;
        }

        const fallbackShape = detectTrajectoryShapeFromText(text);
        if (fallbackShape) {
          const shapePlan = buildGeneralTrajectoryPlan({
            shapeKey: fallbackShape,
            points: null,
            loops: extractRepeatCountBeforeKeyword(text, '次|遍|轮|圈|个'),
            edgeSeconds: parseDurationForCommandSegment(text),
            closeLoop: true,
          });
          if (shapePlan && shapePlan.commands.length) {
            return {
              commands: shapePlan.commands,
              source: 'shape-fallback',
              preview: shapePlan.preview,
              previewDelayMs: shapePlan.previewDelayMs,
              previewShape: shapePlan.previewShape,
              previewSubtitle: shapePlan.previewSubtitle,
              previewPathD: shapePlan.previewPathD,
            };
          }
        }

        const regexSeq = parseCommandSequenceFromText(text);
        if (!regexSeq.length) return { commands: [], source: 'none' };
        const shape = detectTrajectoryShapeFromText(text);
        return {
          commands: applyDistanceHeuristic(regexSeq, text),
          source: 'regex',
          ...(shape ? {
            previewShape: shape,
            preview: `已生成${shapeLabel(shape)}路径，开始执行。`,
            previewDelayMs: 420,
            previewSubtitle: `${shapeLabel(shape)}轨迹预演`,
            previewPathD: '',
          } : {}),
        };
      };

      const parseCommandSequenceFromText = (text) => {
        const raw = String(text || '');
        if (!raw.trim()) return [];

        const macroSeq = parseMacroIntentSequence(raw);
        if (macroSeq.length) return macroSeq;

        const tokenRe = /(前进|向前|往前|\bup\b|后退|向后|往后|\bdown\b|左转|向左|往左|左拐|左弯|\bleft\b|右转|向右|往右|右拐|右弯|\bright\b|抓起|抓取|\bgrab\b|放下|释放|\brelease\b|停止|刹车|停下|停住|\bstop\b|\b停\b)/gi;
        const out = [];
        const matches = [];
        let match = null;
        while ((match = tokenRe.exec(raw)) !== null) {
          matches.push({
            token: String(match[0] || ''),
            index: Number(match.index || 0),
            end: Number(match.index || 0) + String(match[0] || '').length,
          });
        }

        for (let i = 0; i < matches.length; i++) {
          const t = matches[i].token.toLowerCase();
          let cmd = '';
          if (/^(前进|向前|往前|up)$/.test(t)) cmd = 'up';
          else if (/^(后退|向后|往后|down)$/.test(t)) cmd = 'down';
          else if (/^(左转|向左|往左|左拐|左弯|left)$/.test(t)) cmd = 'left';
          else if (/^(右转|向右|往右|右拐|右弯|right)$/.test(t)) cmd = 'right';
          else if (/^(抓起|抓取|grab)$/.test(t)) cmd = 'grab';
          else if (/^(放下|释放|release)$/.test(t)) cmd = 'release';
          else if (/^(停止|刹车|停下|停住|stop|停)$/.test(t)) cmd = 'stop';
          if (!cmd) continue;

          const start = matches[i].index;
          const end = i + 1 < matches.length ? matches[i + 1].index : raw.length;
          const segment = raw.slice(start, end);
          const seconds = parseDurationForCommandSegment(segment) || parseDistanceMetersForCommandSegment(segment);
          const item = seconds ? { cmd, seconds } : { cmd };

          // Compress consecutive duplicates to avoid jitter.
          if (out.length && out[out.length - 1].cmd === cmd && !seconds) continue;
          out.push(item);
        }

        if (out.length) return out;
        const single = parseCommandFromText(raw);
        return single ? [{ cmd: single }] : [];
      };

      const sleepMs = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      const sequenceStepMs = {
        up: 900,
        down: 900,
        left: 420,
        right: 420,
        grab: 550,
        release: 550,
        stop: 260,
      };

      const executeCommandSequence = async (commands, source = 'manual') => {
        const list = Array.isArray(commands)
          ? commands
              .map((item) => {
                if (!item) return null;
                if (typeof item === 'string') return { cmd: item };
                if (item && item.cmd) return item;
                return null;
              })
              .filter(Boolean)
          : [];
        if (!list.length) return false;

        for (let i = 0; i < list.length; i++) {
          const cmd = list[i].cmd;
          const stepSeconds = normalizeDurationSeconds(Number(list[i].seconds));
          const prefix = source === 'voice' ? '语音' : '文本';
          aiHintEl.textContent = `${prefix}序列 ${i + 1}/${list.length}：${getLabel(cmd)}${stepSeconds ? ` ${stepSeconds}秒` : ''}`;

          if (source === 'voice') {
            await runVoiceDirectCommand(cmd, stepSeconds || undefined);
          } else {
            await runPulseCommand(cmd, stepSeconds ? { seconds: stepSeconds } : undefined);
            appendMessage('assistant', `已执行：${getLabel(cmd)}${stepSeconds ? ` ${stepSeconds}秒` : ''} (${i + 1}/${list.length})`);
          }

          if (i < list.length - 1) {
            await sleepMs((stepSeconds ? Math.max(120, Math.round(stepSeconds * 1000)) : (sequenceStepMs[cmd] || 500)));
          }
        }

        aiHintEl.textContent = '多口令已顺序执行完成';
        return true;
      };

      const runVoiceDirectCommand = async (cmd, overrideSeconds) => {
        if (!cmd) return false;
        const voiceSecondsMap = {
          up: 0.85,
          down: 0.85,
          left: 0.12,
          right: 0.12,
          grab: 0.9,
          release: 0.9,
          stop: 0.2,
        };
        const speed = speedForCommand(cmd);
        const seconds = normalizeDurationSeconds(Number(overrideSeconds)) || (voiceSecondsMap[cmd] ?? 0.5);
        setStatus(`语音执行：${getLabel(cmd)}`);
        if (cmd === 'stop') {
          clearPulseStopTimer();
        }

        if (movementCommandSet.has(cmd) || cmd === 'stop') {
          sendRobotCommand(cmd, speed, 0, { fireAndForget: true });
        } else {
          const actuatorSeconds = (cmd === 'grab' || cmd === 'release')
            ? Math.max(0.85, seconds || 0)
            : 0;
          const ok = await sendRobotCommand(cmd, speed, actuatorSeconds);
          if (!ok) {
            setStatus(`语音执行失败：${getLabel(cmd)}，请检查网址/IP`, true);
            appendMessage('assistant', `语音已识别，但执行失败：${getLabel(cmd)}`);
            return false;
          }
        }
        if (movementCommandSet.has(cmd)) {
          schedulePulseStop(seconds);
        }
        appendMessage('assistant', `已按语音执行：${getLabel(cmd)}`);
        return true;
      };

      const handleVoiceCommandText = async (text) => {
        const parsed = await parseCommandSequenceSmart(text, 'voice');
        const commandSeq = parsed.commands || [];
        if (!commandSeq.length) {
          aiHintEl.textContent = '已转文字，未匹配到控制口令，请说“前进/后退/左转/右转/停止”';
          return false;
        }
        if (VERBOSE_SEMANTIC_EXPLAIN && parsed.source === 'llm' && parsed.reason) {
          appendMessage('assistant', `语义拆解：${parsed.reason}`);
        }
        if (parsed.preview) {
          appendTrajectoryPreviewCard(aiLogEl, parsed.preview, parsed.previewShape || 'square', parsed.previewSubtitle || '轨迹预演', parsed.previewPathD || '');
          await sleepMs(Math.max(260, Number(parsed.previewDelayMs) || 520));
        }
        if (commandSeq.length === 1) {
          const one = commandSeq[0];
          const cmd = one.cmd;
          const sec = normalizeDurationSeconds(Number(one.seconds));
          aiHintEl.textContent = `识别到口令：${getLabel(cmd)}${sec ? ` ${sec}秒` : ''}，正在执行`;
          await runVoiceDirectCommand(cmd, sec || undefined);
          return true;
        }

        appendMessage('assistant', `识别到多口令：${commandSeq.map((c) => `${getLabel(c.cmd)}${c.seconds ? `${normalizeDurationSeconds(Number(c.seconds))}秒` : ''}`).join(' -> ')}`);
        return executeCommandSequence(commandSeq, 'voice');
      };

      const executeLlmCommand = async (cmd) => {
        if (!cmd) return;
        await runPulseCommand(cmd);
        appendMessage('assistant', `已执行：${getLabel(cmd)}`);
      };

      const askZhipu = async (text, trigger) => {
        const userText = String(text || '').trim();
        if (!userText) return;

        appendMessage('user', userText);
        aiInputEl.value = '';
        askBtnEl.disabled = true;

        const parsedDirect = await parseCommandSequenceSmart(userText, 'control');
        const directSeq = parsedDirect.commands || [];
        if (directSeq.length >= 1) {
          if (VERBOSE_SEMANTIC_EXPLAIN && parsedDirect.source === 'llm' && parsedDirect.reason) {
            appendMessage('assistant', `语义拆解：${parsedDirect.reason}`);
          }
          if (parsedDirect.preview) {
            appendTrajectoryPreviewCard(aiLogEl, parsedDirect.preview, parsedDirect.previewShape || 'square', parsedDirect.previewSubtitle || '轨迹预演', parsedDirect.previewPathD || '');
            await sleepMs(Math.max(260, Number(parsedDirect.previewDelayMs) || 520));
          }
          appendMessage('assistant', `收到口令序列：${directSeq.map((c) => `${getLabel(c.cmd)}${c.seconds ? `${normalizeDurationSeconds(Number(c.seconds))}秒` : ''}`).join(' -> ')}`);
          await executeCommandSequence(directSeq, 'manual');
          askBtnEl.disabled = false;
          return;
        }

        try {
          const resp = await fetch(`${llmApiBase}/api/llm-proxy`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              system:
                '你是小车控制助手。先给简短中文回复。若可执行控制，请在最后一行输出 [SEQ:cmd@秒,cmd@秒]，cmd 仅可为 up|down|left|right|stop|grab|release；不需要秒可省略 @秒。若无法执行输出 [CMD:none]。',
              userText,
              maxTokens: 300,
            }),
          });

          const data = await resp.json().catch(() => ({}));
          if (!resp.ok) {
            throw new Error(data.detail || data.error || 'llm请求失败');
          }

          const answer = String(data.text || '').trim();
          const seqMatch = answer.match(/\[SEQ:([^\]]+)\]/i);
          const cmdMatch = answer.match(/\[CMD:(up|down|left|right|stop|grab|release|none)\]/i);
          const parsedBySeqTag = seqMatch ? parseSequenceTag(seqMatch[1]) : [];
          const parsedLoose = parseLooseCommandSyntax(answer);
          const parsedByLlm = parsedBySeqTag.length
            ? parsedBySeqTag
            : (cmdMatch ? [{ cmd: cmdMatch[1].toLowerCase() }] : (parsedLoose.length ? parsedLoose : parseCommandSequenceFromText(answer)));
          const cleanAnswer = answer.replace(/\[(CMD|SEQ):[^\]]+\]/gi, '').trim() || '已收到。';

          if (!(parsedByLlm.length && parsedByLlm[0].cmd !== 'none')) {
            appendMessage('assistant', cleanAnswer);
          } else {
            appendMessage('assistant', '已生成动作，开始执行。');
          }
          if (parsedByLlm.length && parsedByLlm[0].cmd !== 'none') {
            if (parsedByLlm.length === 1) {
              await executeLlmCommand(parsedByLlm[0].cmd);
            } else {
              await executeCommandSequence(parsedByLlm, 'manual');
            }
          }

          if (trigger === 'voice') {
            setStatus('语音文本已发送');
          }
        } catch (error) {
          appendMessage('assistant', `模型调用失败：${error.message}`);
          setStatus('模型调用失败，请检查服务与密钥', true);
        } finally {
          askBtnEl.disabled = false;
        }
      };

      const runContinuousCommand = (cmd) => {
        clearPulseStopTimer();
        clearHoldRepeatTimer();
        const speed = speedForCommand(cmd);
        setStatus(`持续：${getLabel(cmd)}`);
        sendRobotCommand(cmd, speed, 0, { fireAndForget: true }).catch((error) => {
          console.error(error);
        });
        scheduleHoldRepeat();
      };

      const computeNextContinuousCmd = () => {
        const remaining = Array.from(activeHoldCommands.values());
        if (!remaining.length) return null;

        const hasVertical = remaining.some((c) => isVerticalCommand(c));
        const hasHorizontal = remaining.some((c) => isHorizontalCommand(c));

        // Combo rule: when vertical + horizontal are both held, prioritize horizontal for in-place spinning.
        if (hasVertical && hasHorizontal) {
          for (let i = remaining.length - 1; i >= 0; i--) {
            if (isHorizontalCommand(remaining[i])) return remaining[i];
          }
        }

        return remaining[remaining.length - 1];
      };

      const syncContinuousMovement = () => {
        const nextCmd = computeNextContinuousCmd();
        if (!nextCmd) {
          clearHoldRepeatTimer();
          if (activeMovementCmd) {
            activeMovementCmd = null;
            runPulseCommand('stop');
          }
          return;
        }

        if (nextCmd !== activeMovementCmd) {
          activeMovementCmd = nextCmd;
          runContinuousCommand(nextCmd);
        }
      };

      const startHoldCommand = (cmd, key) => {
        if (!movementCommands.has(cmd)) return;
        if (activeHoldCommands.has(key)) return;

        activeHoldCommands.set(key, cmd);
        syncContinuousMovement();
      };

      const stopHoldCommand = (key, shouldSendStop = false) => {
        const releasedCmd = activeHoldCommands.get(key);
        if (!releasedCmd) {
          if (shouldSendStop) {
            forceImmediateStop('释放兜底');
          }
          return;
        }

        activeHoldCommands.delete(key);
        if (!shouldSendStop) return;

        if (!activeHoldCommands.size) {
          clearHoldRepeatTimer();
          forceImmediateStop('松开按键');
          return;
        }

        syncContinuousMovement();
      };

      const forceStopAllHolds = () => {
        const keys = Array.from(activeHoldCommands.keys());
        for (const key of keys) {
          stopHoldCommand(key, true);
        }
        if (!keys.length) {
          forceImmediateStop('全局释放');
          return;
        }
        if (activeMovementCmd) {
          forceImmediateStop('全局释放');
        }
      };

      applyIpBtn.addEventListener('click', () => {
        const ip = sanitizeIp(targetIpEl.value);
        if (!ip) {
          setStatus('网址/IP 不能为空', true);
          return;
        }
        carControl.ip = ip;
        targetIpEl.value = ip;
        localStorage.setItem('robot.control.ip', ip);
        setStatus(`已切换到 ${ip}`);
        warmupRobotLocalLinks();
        refreshVisionSources();
      });

      quickIpBtns.forEach((btn) => {
        btn.addEventListener('click', () => {
          targetIpEl.value = btn.dataset.ip;
          applyIpBtn.click();
        });
      });

      warmupRobotLocalLinks();
      refreshVisionSources();
      setDocxMode('control');

      if (docxTabDocEl) {
        docxTabDocEl.addEventListener('click', () => {
          setDocxMode('control');
        });
      }

      if (docxTabVisionEl) {
        docxTabVisionEl.addEventListener('click', async () => {
          setDocxMode('vision');
          await wakeupRobotCamera();
          loadVisionByIndex(0, '实时画面');
        });
      }

      if (visionLoadBtnEl) {
        visionLoadBtnEl.addEventListener('click', async () => {
          await wakeupRobotCamera();
          loadVisionByIndex(visionIndex, '手动加载');
        });
      }

      if (visionNextBtnEl) {
        visionNextBtnEl.addEventListener('click', async () => {
          await wakeupRobotCamera();
          loadVisionByIndex(visionIndex + 1, '切换源');
        });
      }

      if (visionOpenBtnEl) {
        visionOpenBtnEl.addEventListener('click', () => {
          if (!visionCandidates.length) {
            if (visionHintEl) visionHintEl.textContent = '请先设置有效小车网址/IP';
            return;
          }
          const url = visionCandidates[visionIndex] || visionCandidates[0];
          window.open(url, '_blank', 'noopener,noreferrer');
          if (visionHintEl) visionHintEl.textContent = '已在新窗口打开当前视角源';
        });
      }

      if (visionAnalyzeBtnEl) {
        visionAnalyzeBtnEl.addEventListener('click', () => {
          analyzeVisionFrame();
        });
      }

      if (visionAskBtnEl && visionAiInputEl) {
        visionAskBtnEl.addEventListener('click', () => {
          askZhipuVision(visionAiInputEl.value, 'text');
        });

        visionAiInputEl.addEventListener('keydown', (event) => {
          if (event.key !== 'Enter') return;
          event.preventDefault();
          askZhipuVision(visionAiInputEl.value, 'text');
        });
      }

      if (visionVoiceBtnEl) {
        visionVoiceBtnEl.addEventListener('click', () => {
          if (visionVoiceRecording) {
            stopVisionVoiceRecording();
          } else {
            startVisionVoiceRecording();
          }
        });
      }

      commandBtns.forEach((btn) => {
        btn.addEventListener('click', () => {
          const cmd = btn.dataset.cmd;
          if (movementCommands.has(cmd)) {
            // Movement buttons are controlled only by pointer hold/release.
            return;
          }
          if (ignoreNextClickCommands.has(cmd)) {
            ignoreNextClickCommands.delete(cmd);
            return;
          }
          runPulseCommand(cmd);
        });

        btn.addEventListener('pointerdown', (event) => {
          const cmd = btn.dataset.cmd;
          if (!movementCommands.has(cmd)) return;
          event.preventDefault();
          btn.classList.add('active');
          btn.setPointerCapture(event.pointerId);
          const key = `ptr-${event.pointerId}`;
          directionalPointerDown.set(key, cmd);

          startHoldCommand(cmd, key);
        });

        btn.addEventListener('pointerup', (event) => {
          const cmd = btn.dataset.cmd;
          const key = `ptr-${event.pointerId}`;
          const wasHold = activeHoldCommands.has(key);
          btn.classList.remove('active');
          directionalPointerDown.delete(key);
          if (movementCommands.has(cmd) && wasHold) {
            ignoreNextClickCommands.add(cmd);
          }
          stopHoldCommand(key, true);
        });

        btn.addEventListener('pointercancel', (event) => {
          btn.classList.remove('active');
          const key = `ptr-${event.pointerId}`;
          directionalPointerDown.delete(key);
          stopHoldCommand(key, true);
        });

        btn.addEventListener('lostpointercapture', (event) => {
          btn.classList.remove('active');
          const key = `ptr-${event.pointerId}`;
          directionalPointerDown.delete(key);
          stopHoldCommand(key, true);
        });
      });

      const keyboardMap = {
        ArrowUp: 'up',
        ArrowDown: 'down',
        ArrowLeft: 'left',
        ArrowRight: 'right',
        KeyW: 'up',
        KeyS: 'down',
        KeyA: 'left',
        KeyD: 'right',
        KeyG: 'grab',
        KeyR: 'release',
        Space: 'stop',
      };

      const isEditableTarget = (el) => {
        if (!el) return false;
        const tag = String(el.tagName || '').toUpperCase();
        if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return true;
        return !!el.isContentEditable;
      };

      window.addEventListener('keydown', (event) => {
        // While typing in chat/IP fields, never dispatch robot keyboard commands.
        if (isEditableTarget(event.target)) {
          return;
        }

        const cmd = keyboardMap[event.code];
        if (!cmd) return;
        event.preventDefault();
        if (pressed.has(event.code)) return;
        pressed.add(event.code);

        if (movementCommands.has(cmd)) {
          const key = `key-${event.code}`;
          startHoldCommand(cmd, key);
          return;
        }

        runPulseCommand(cmd);
      });

      window.addEventListener('keyup', (event) => {
        if (isEditableTarget(event.target)) {
          return;
        }

        const releasedCmd = keyboardMap[event.code];
        pressed.delete(event.code);
        stopHoldCommand(`key-${event.code}`, movementCommands.has(releasedCmd));
      });

      window.addEventListener('blur', () => {
        activeHoldCommands.clear();
        activeMovementCmd = null;
        pressed.clear();
        forceImmediateStop('窗口失焦');
      });

      window.addEventListener('pointerup', () => {
        forceStopAllHolds();
      });

      window.addEventListener('pointercancel', () => {
        forceStopAllHolds();
      });

      window.addEventListener('pointerleave', () => {
        forceStopAllHolds();
      });

      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          forceStopAllHolds();
        }
      });

      askBtnEl.addEventListener('click', () => {
        askZhipu(aiInputEl.value, 'text');
      });

      aiInputEl.addEventListener('keydown', (event) => {
        if (event.key !== 'Enter') return;
        event.preventDefault();
        askZhipu(aiInputEl.value, 'text');
      });

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
      const FORCE_REALTIME_RECORDING = true;
      const supportsRecorder = !!(
        navigator.mediaDevices &&
        navigator.mediaDevices.getUserMedia &&
        (window.MediaRecorder || AudioContextCtor)
      );
      let recognition = null;
      let listening = false;
      let liveSpeechText = '';
      let voiceMode = 'idle';
      let shouldFallbackToRecorder = false;
      let recorderBackend = 'none';
      let mediaRecorder = null;
      let mediaStream = null;
      let recorderChunks = [];
      let audioContext = null;
      let audioSourceNode = null;
      let audioProcessorNode = null;
      let audioMuteNode = null;
      let pcmChunks = [];
      let pcmSampleRate = 16000;
      let srStartTimer = null;
      let recorderAutoStopTimer = null;
      let srNoTextFallbackTried = false;

      const setVoiceUiListening = (isOn, hint) => {
        listening = isOn;
        if (isOn) {
          voiceBtnEl.classList.add('listening');
          voiceBtnEl.textContent = '停止录音';
        } else {
          voiceBtnEl.classList.remove('listening');
          voiceBtnEl.textContent = '开始录音';
        }
        if (hint) {
          aiHintEl.textContent = hint;
        }
      };

      if (FORCE_REALTIME_RECORDING) {
        if (voiceNativeBtnEl) voiceNativeBtnEl.style.display = 'none';
        if (voiceFileBtnEl) voiceFileBtnEl.style.display = 'none';
        voiceBtnEl.textContent = '开始录音';
        aiHintEl.textContent = '实时录音模式：点击“开始录音”，说话后点“停止录音”自动转文字';
      }

      const pickRecorderMimeType = () => {
        const candidates = ['audio/mp4', 'audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus'];
        for (const type of candidates) {
          if (window.MediaRecorder && window.MediaRecorder.isTypeSupported && window.MediaRecorder.isTypeSupported(type)) {
            return type;
          }
        }
        return '';
      };

      const encodeWavFromPcm = (buffers, sampleRate) => {
        const chunks = Array.isArray(buffers) ? buffers : [];
        const totalSamples = chunks.reduce((sum, arr) => sum + (arr ? arr.length : 0), 0);
        const wavBuffer = new ArrayBuffer(44 + totalSamples * 2);
        const view = new DataView(wavBuffer);

        const writeString = (offset, value) => {
          for (let i = 0; i < value.length; i++) {
            view.setUint8(offset + i, value.charCodeAt(i));
          }
        };

        writeString(0, 'RIFF');
        view.setUint32(4, 36 + totalSamples * 2, true);
        writeString(8, 'WAVE');
        writeString(12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, 1, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);
        writeString(36, 'data');
        view.setUint32(40, totalSamples * 2, true);

        let offset = 44;
        for (const chunk of chunks) {
          if (!chunk) continue;
          for (let i = 0; i < chunk.length; i++) {
            const sample = Math.max(-1, Math.min(1, chunk[i]));
            const int16 = sample < 0 ? sample * 0x8000 : sample * 0x7fff;
            view.setInt16(offset, int16, true);
            offset += 2;
          }
        }

        return new Blob([view], { type: 'audio/wav' });
      };

      const transcribeBlobByServer = async (blob) => {
        if (!blob || blob.size <= 0) {
          aiHintEl.textContent = '录音为空，请重试';
          return;
        }

        if (blob.size < 1200) {
          aiHintEl.textContent = '录音太短，请多说1-2秒再停止';
          return;
        }

        aiHintEl.textContent = `正在转写语音(${blob.type || 'unknown'}, ${(blob.size / 1024).toFixed(1)}KB)...`;
        try {
          const form = new FormData();
          let ext = 'wav';
          if (blob.type && blob.type.includes('mp4')) ext = 'm4a';
          else if (blob.type && blob.type.includes('webm')) ext = 'webm';
          else if (blob.type && blob.type.includes('ogg')) ext = 'ogg';
          form.append('file', blob, `voice.${ext}`);
          form.append('model', 'glm-asr-2512');

          const resp = await fetch(`${llmApiBase}/api/asr-zhipu`, {
            method: 'POST',
            body: form,
          });
          const data = await resp.json().catch(() => ({}));
          if (!resp.ok || !data.ok) {
            const detail = data && (data.detail || data.error) ? String(data.detail || data.error) : '语音转写失败';
            const unsupportedFormat = /不支持当前文件格式|unsupported|1214/i.test(detail);
            if (unsupportedFormat && blob.type !== 'audio/wav') {
              const wavBlob = await convertBlobToWav(blob);
              if (wavBlob && wavBlob.size > 0) {
                appendMessage('assistant', '检测到音频格式不兼容，已自动转WAV重试。');
                await transcribeBlobByServer(wavBlob);
                return;
              }
            }
            throw new Error(detail);
          }

          const text = String(data.text || '').trim();
          if (!text) {
            aiHintEl.textContent = '未识别到有效语音，请重试';
            appendMessage('assistant', '语音转写完成，但未识别到有效文本。');
            return;
          }

          aiInputEl.value = text;
          appendMessage('assistant', `语音识别：${text}`);
          const executed = await handleVoiceCommandText(text);
          if (!executed) {
            aiHintEl.textContent = '语音已转文字，点击发送可走智能助手';
          }
        } catch (error) {
          aiHintEl.textContent = `语音转写异常：${error && error.message ? error.message : 'unknown'}，请重试录音`;
          appendMessage('assistant', `语音转写异常：${error && error.message ? error.message : 'unknown'}。请检查麦克风权限后重试录音。`);
        }
      };

      const convertBlobToWav = async (blob) => {
        if (!blob || !blob.size || !AudioContextCtor) return null;
        try {
          const tmpCtx = new AudioContextCtor();
          const arr = await blob.arrayBuffer();
          const decoded = await tmpCtx.decodeAudioData(arr.slice(0));
          const channel = decoded.numberOfChannels > 0 ? decoded.getChannelData(0) : null;
          if (!channel) {
            await tmpCtx.close();
            return null;
          }

          const targetRate = 16000;
          const ratio = decoded.sampleRate / targetRate;
          const outLen = Math.max(1, Math.floor(channel.length / ratio));
          const out = new Float32Array(outLen);
          for (let i = 0; i < outLen; i++) {
            const srcIndex = Math.min(channel.length - 1, Math.floor(i * ratio));
            out[i] = channel[srcIndex];
          }
          await tmpCtx.close();
          return encodeWavFromPcm([out], targetRate);
        } catch {
          return null;
        }
      };

      const stopRecorderTracks = () => {
        if (mediaStream) {
          mediaStream.getTracks().forEach((t) => t.stop());
        }
        mediaStream = null;
      };

      const cleanupAudioNodes = async () => {
        try {
          if (audioSourceNode) audioSourceNode.disconnect();
        } catch {}
        try {
          if (audioProcessorNode) audioProcessorNode.disconnect();
        } catch {}
        try {
          if (audioMuteNode) audioMuteNode.disconnect();
        } catch {}
        audioSourceNode = null;
        audioProcessorNode = null;
        audioMuteNode = null;

        if (audioContext) {
          try {
            await audioContext.close();
          } catch {}
        }
        audioContext = null;
      };

      const finalizePcmRecording = async () => {
        const localChunks = pcmChunks;
        const sampleRate = pcmSampleRate;
        pcmChunks = [];

        await cleanupAudioNodes();
        stopRecorderTracks();
        recorderBackend = 'none';
        voiceMode = 'idle';
        setVoiceUiListening(false, '录音已结束，正在转写');

        const blob = encodeWavFromPcm(localChunks, sampleRate);
        await transcribeBlobByServer(blob);
      };

      const startRecorderFallback = async (reason) => {
        if (!supportsRecorder || listening) return;

        const getUserMediaWithTimeout = async (ms = 10000) => {
          if (!navigator.mediaDevices || typeof navigator.mediaDevices.getUserMedia !== 'function') {
            throw new Error('browser_no_getUserMedia');
          }
          const timeoutPromise = new Promise((_, reject) => {
            setTimeout(() => reject(new Error('mic_permission_timeout')), ms);
          });
          return Promise.race([navigator.mediaDevices.getUserMedia({ audio: true }), timeoutPromise]);
        };

        const startMediaRecorderFallback = async () => {
          mediaStream = await getUserMediaWithTimeout(10000);
          recorderChunks = [];
          const mimeType = pickRecorderMimeType();
          mediaRecorder = mimeType ? new MediaRecorder(mediaStream, { mimeType }) : new MediaRecorder(mediaStream);

          mediaRecorder.ondataavailable = (event) => {
            if (event.data && event.data.size > 0) {
              recorderChunks.push(event.data);
            }
          };

          mediaRecorder.onstop = async () => {
            const outputType = mediaRecorder && mediaRecorder.mimeType ? mediaRecorder.mimeType : 'audio/webm';
            const blob = new Blob(recorderChunks, { type: outputType });
            recorderChunks = [];
            stopRecorderTracks();
            recorderBackend = 'none';
            voiceMode = 'idle';
            setVoiceUiListening(false, '录音已结束，正在转写');
            await transcribeBlobByServer(blob);
          };

          mediaRecorder.onerror = (event) => {
            const msg = event && event.error && event.error.message ? event.error.message : 'recorder_error';
            recorderBackend = 'none';
            voiceMode = 'idle';
            setVoiceUiListening(false, `录音异常：${msg}`);
            appendMessage('assistant', `录音异常：${msg}`);
            stopRecorderTracks();
          };

          recorderBackend = 'media';
          voiceMode = 'recorder';
          mediaRecorder.start(250);
          setVoiceUiListening(true, reason || '录音中，再点一次停止并转写');
          recorderAutoStopTimer = setTimeout(() => {
            if (voiceMode === 'recorder') {
              stopRecorderFallback();
            }
          }, 15000);
        };

        try {
          setVoiceUiListening(true, '正在申请麦克风权限，请点击浏览器地址栏“允许”');
          mediaStream = await getUserMediaWithTimeout(10000);

          if (AudioContextCtor) {
            audioContext = new AudioContextCtor({ sampleRate: 16000 });
            pcmSampleRate = audioContext.sampleRate || 16000;
            pcmChunks = [];

            audioSourceNode = audioContext.createMediaStreamSource(mediaStream);
            audioProcessorNode = audioContext.createScriptProcessor(4096, 1, 1);
            audioMuteNode = audioContext.createGain();
            audioMuteNode.gain.value = 0;

            audioProcessorNode.onaudioprocess = (event) => {
              const input = event && event.inputBuffer ? event.inputBuffer.getChannelData(0) : null;
              if (!input || !input.length) return;
              pcmChunks.push(new Float32Array(input));
            };

            audioSourceNode.connect(audioProcessorNode);
            audioProcessorNode.connect(audioMuteNode);
            audioMuteNode.connect(audioContext.destination);

            recorderBackend = 'pcm';
            voiceMode = 'recorder';
            setVoiceUiListening(true, reason || '录音中，再点一次停止并转写');
            recorderAutoStopTimer = setTimeout(() => {
              if (voiceMode === 'recorder') {
                stopRecorderFallback();
              }
            }, 15000);
            return;
          }

          stopRecorderTracks();
          await startMediaRecorderFallback();
        } catch (error) {
          try {
            await cleanupAudioNodes();
            stopRecorderTracks();
            await startMediaRecorderFallback();
          } catch {
            const msg = error && error.message ? error.message : 'unknown';
            if (msg === 'mic_permission_timeout') {
              setVoiceUiListening(false, '麦克风权限等待超时，请点击地址栏相机/麦克风图标选择“允许”后重试');
              appendMessage('assistant', '语音未启动：麦克风权限等待超时，请允许麦克风后重试。');
              return;
            }
            setVoiceUiListening(false, `麦克风权限失败：${msg}`);
            appendMessage('assistant', '语音未启动：请在浏览器地址栏开启麦克风权限后重试。');
          }
        }
      };

      const stopRecorderFallback = () => {
        if (voiceMode !== 'recorder') return;

        if (recorderAutoStopTimer) {
          clearTimeout(recorderAutoStopTimer);
          recorderAutoStopTimer = null;
        }

        if (recorderBackend === 'pcm') {
          finalizePcmRecording().catch((error) => {
            recorderBackend = 'none';
            voiceMode = 'idle';
            setVoiceUiListening(false, `录音结束异常：${error && error.message ? error.message : 'unknown'}`);
          });
          return;
        }

        if (mediaRecorder) {
          try {
            mediaRecorder.stop();
            return;
          } catch {}
        }

        recorderBackend = 'none';
        stopRecorderTracks();
        voiceMode = 'idle';
        setVoiceUiListening(false, '录音已结束');
      };

      const startVoiceRecognition = () => {
        if (!recognition || listening) return;

        const startCore = () => {
          try {
            shouldFallbackToRecorder = false;
            voiceMode = 'sr';
            recognition.start();
            if (srStartTimer) clearTimeout(srStartTimer);
            srStartTimer = setTimeout(() => {
              if (voiceMode === 'sr' && !listening && supportsRecorder) {
                try {
                  recognition.abort();
                } catch {}
                voiceMode = 'idle';
                startRecorderFallback('语音识别启动超时，已切换录音转写');
              }
            }, 2500);
          } catch (error) {
            voiceMode = 'idle';
            aiHintEl.textContent = `语音启动失败：${error && error.message ? error.message : 'unknown'}`;
            if (supportsRecorder) {
              startRecorderFallback('浏览器语音不可用，已切换录音转写');
            }
          }
        };

        if (navigator.mediaDevices && typeof navigator.mediaDevices.getUserMedia === 'function') {
          navigator.mediaDevices
            .getUserMedia({ audio: true })
            .then((stream) => {
              stream.getTracks().forEach((t) => t.stop());
              startCore();
            })
            .catch((error) => {
              aiHintEl.textContent = `麦克风权限失败：${error && error.message ? error.message : '请检查浏览器权限'}`;
              appendMessage('assistant', '语音未启动：请在浏览器地址栏开启麦克风权限后重试，或点击“上传音频”。');
            });
          return;
        }

        startCore();
      };

      const stopVoiceRecognition = () => {
        if (!recognition || voiceMode !== 'sr') return;
        try {
          recognition.stop();
        } catch {
          voiceMode = 'idle';
        }
      };

      if (SpeechRecognition && !FORCE_REALTIME_RECORDING) {
        recognition = new SpeechRecognition();
        recognition.lang = 'zh-CN';
        recognition.interimResults = true;
        recognition.continuous = true;

        recognition.onstart = () => {
          if (srStartTimer) {
            clearTimeout(srStartTimer);
            srStartTimer = null;
          }
          srNoTextFallbackTried = false;
          liveSpeechText = '';
          setVoiceUiListening(true, '正在听你说话...');
        };

        recognition.onend = () => {
          if (srStartTimer) {
            clearTimeout(srStartTimer);
            srStartTimer = null;
          }
          if (voiceMode === 'recorder') return;

          const needFallback = shouldFallbackToRecorder;
          shouldFallbackToRecorder = false;
          voiceMode = 'idle';
          setVoiceUiListening(false);

          if (needFallback && supportsRecorder) {
            startRecorderFallback('浏览器识别异常，已切换录音转写');
            return;
          }

          if (liveSpeechText && !String(aiInputEl.value || '').trim()) {
            aiInputEl.value = liveSpeechText;
          }
          if (String(aiInputEl.value || '').trim()) {
            aiHintEl.textContent = '语音已转文字，点击发送即可';
          } else {
            if (supportsRecorder && !srNoTextFallbackTried) {
              srNoTextFallbackTried = true;
              startRecorderFallback('未识别到文本，已自动切换录音转写');
              return;
            }
            aiHintEl.textContent = '未识别到语音，请更靠近麦克风后重试';
          }
        };

        recognition.onerror = (event) => {
          if (srStartTimer) {
            clearTimeout(srStartTimer);
            srStartTimer = null;
          }
          const err = event && event.error ? String(event.error) : 'unknown';
          appendMessage('assistant', `语音识别异常：${err}`);

          // Browser SR fails often with network/service-not-allowed/audio-capture on some devices.
          if (supportsRecorder && ['network', 'service-not-allowed', 'audio-capture', 'not-allowed', 'aborted'].includes(err)) {
            shouldFallbackToRecorder = false;
            voiceMode = 'idle';
            setVoiceUiListening(false, `语音识别异常(${err})，切换录音转写...`);
            try {
              recognition.abort();
            } catch {}
            startRecorderFallback('浏览器识别异常，已切换录音转写');
            return;
          }

          aiHintEl.textContent = `语音识别异常：${err}`;
        };

        recognition.onresult = (event) => {
          let finalText = '';
          let interimText = '';

          for (let i = event.resultIndex; i < event.results.length; i++) {
            const item = event.results[i];
            if (!item || !item[0]) continue;
            const piece = String(item[0].transcript || '').trim();
            if (!piece) continue;
            if (item.isFinal) {
              finalText += `${piece} `;
            } else {
              interimText += `${piece} `;
            }
          }

          const finalValue = finalText.trim();
          const interimValue = interimText.trim();

          const mergedLive = [liveSpeechText, finalValue, interimValue].filter(Boolean).join(' ').trim();
          if (mergedLive) {
            aiInputEl.value = mergedLive;
          }

          if (interimValue) {
            aiHintEl.textContent = `识别中：${interimValue}`;
          }

          if (!finalValue) return;

          liveSpeechText = [liveSpeechText, finalValue].filter(Boolean).join(' ').trim();
          aiInputEl.value = liveSpeechText;
          appendMessage('assistant', `语音识别：${finalValue}`);
          aiHintEl.textContent = '语音已转文字，点击发送即可';
        };
      }

      voiceNativeBtnEl.addEventListener('click', () => {
        nativeSpeechInputEl.value = '';
        aiHintEl.textContent = '系统听写已打开，请说话';
        setTimeout(() => {
          if (!String(nativeSpeechInputEl.value || '').trim()) {
            aiHintEl.textContent = '系统听写未返回文本，请改用“语音输入”或检查浏览器麦克风权限';
          }
        }, 8000);
        nativeSpeechInputEl.click();
      });

      const adoptNativeSpeechText = () => {
        const t = String(nativeSpeechInputEl.value || '').trim();
        if (!t) return;
        aiInputEl.value = t;
        appendMessage('assistant', `系统听写：${t}`);
        aiHintEl.textContent = '系统听写已转文字，点击发送即可';
      };
      nativeSpeechInputEl.addEventListener('change', adoptNativeSpeechText);
      nativeSpeechInputEl.addEventListener('input', adoptNativeSpeechText);

      voiceFileBtnEl.addEventListener('click', () => {
        voiceFileInputEl.value = '';
        voiceFileInputEl.click();
      });

      voiceFileInputEl.addEventListener('change', async () => {
        const file = voiceFileInputEl.files && voiceFileInputEl.files[0] ? voiceFileInputEl.files[0] : null;
        if (!file) return;
        appendMessage('assistant', `已选择音频：${file.name} (${(file.size / 1024).toFixed(1)}KB, ${file.type || 'unknown'})`);
        await transcribeBlobByServer(file);
      });

      voiceBtnEl.addEventListener('click', () => {
        if (voiceMode === 'recorder') {
          stopRecorderFallback();
          return;
        }

        if (!supportsRecorder) {
          voiceBtnEl.disabled = true;
          aiHintEl.textContent = '当前浏览器不支持实时录音，请更换浏览器';
          return;
        }

        startRecorderFallback('实时录音中，请说话；再点一次停止并转写');
      });

      const checkLlmRuntime = async () => {
        try {
          const resp = await fetch(`${llmApiBase}/api/llm/runtime`, { cache: 'no-store' });
          const data = await resp.json();
          if (!resp.ok || !data.ok) throw new Error('runtime读取失败');

          const provider = String(data.provider || '').toLowerCase();
          const model = String(data.model || 'unknown');
          if (provider === 'zhipu') {
            setLlmBadge(`智谱 ${model}`);
          } else {
            setLlmBadge(`当前:${provider || 'unknown'}`, true);
            appendMessage('assistant', '提示：后端当前不是 zhipu。若要切到智谱，请设置 LLM_PROVIDER=zhipu 与 ZHIPU_API_KEY 后重启服务。');
          }
        } catch {
          setLlmBadge('未连接', true);
          appendMessage('assistant', `提示：无法连接 ${llmApiBase}/api/llm/runtime，请先启动本地服务。`);
        }
      };

      checkLlmRuntime();
    </script>
  </body>
</html>
